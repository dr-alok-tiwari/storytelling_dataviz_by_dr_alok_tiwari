name: Quality checks

on:
  push:
    branches: [main, production-ready-upgrade]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install application and development dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q app.py modules tests

      - name: Lint production shell
        run: ruff check app.py modules/data_generators.py modules/home.py modules/tools.py modules/tools_runtime_patch.py modules/ui_components.py tests --ignore E402,F401

      - name: Test
        run: pytest
